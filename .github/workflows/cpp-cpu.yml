name: C++ CPU Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  cpp-cpu:
    runs-on: ubuntu-latest
    container:
      image: rapidsai/base:25.10a-cuda12-py3.12

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install compiler
        run: conda install -y -c conda-forge gcc gxx binutils

      - name: Install cmake and ninja
        run: |
          CMAKE_VERSION=4.2.3
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/Kitware/CMake/releases/download/v${CMAKE_VERSION}/cmake-${CMAKE_VERSION}-linux-x86_64.tar.gz" \
            | tar -xz -C "$HOME/.local" --strip-components=1
          NINJA_VERSION=1.12.1
          curl -fsSL "https://github.com/ninja-build/ninja/releases/download/v${NINJA_VERSION}/ninja-linux.zip" \
            -o /tmp/ninja-linux.zip
          python3 -c "import zipfile; zipfile.ZipFile('/tmp/ninja-linux.zip').extractall('$HOME/.local/bin')"
          chmod +x "$HOME/.local/bin/ninja"
          rm /tmp/ninja-linux.zip
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Configure (CPP)
        run: ./scripts/build.sh --configure --cudf_ROOT=/opt/conda

      - name: Build (CPP)
        run: ./scripts/build.sh --build

      - name: Install (CPP)
        run: ./scripts/build.sh --install

      - name: Run CPU tests (CPP)
        run: ctest --test-dir cpp/build -L cpu --output-on-failure

      - name: Run Rust tests
        run: cargo test -p peacockdb-core
        env:
          CMAKE_GENERATOR: Ninja
