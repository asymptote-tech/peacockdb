name: C++ CPU Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  cpp-cpu:
    strategy:
      matrix:
        include:
          - cudf: "26.02"
            image: rapidsai/base:25.10a-cuda12-py3.12
          - cudf: "25.02"
            image: rapidsai/base:25.02-cuda12.0-py3.12
    name: C++ CPU Tests (cudf ${{ matrix.cudf }})
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}

    steps:
      - name: Install git
        if: matrix.cudf == '25.02'
        run: conda install -y -n base -c conda-forge git curl

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install compiler
        run: conda install -y -c conda-forge gcc gxx binutils

      - name: Install cmake and ninja
        run: |
          CMAKE_VERSION=4.2.3
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/Kitware/CMake/releases/download/v${CMAKE_VERSION}/cmake-${CMAKE_VERSION}-linux-x86_64.tar.gz" \
            | tar -xz -C "$HOME/.local" --strip-components=1
          NINJA_VERSION=1.12.1
          curl -fsSL "https://github.com/ninja-build/ninja/releases/download/v${NINJA_VERSION}/ninja-linux.zip" \
            -o /tmp/ninja-linux.zip
          python3 -c "import zipfile; zipfile.ZipFile('/tmp/ninja-linux.zip').extractall('$HOME/.local/bin')"
          chmod +x "$HOME/.local/bin/ninja"
          rm /tmp/ninja-linux.zip
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Configure (CPP)
        run: ./scripts/build.sh --configure --cudf_ROOT /opt/conda

      - name: Build (CPP)
        run: ./scripts/build.sh --build
        env:
          LIBRARY_PATH: /opt/conda/lib

      - name: Install (CPP)
        run: ./scripts/build.sh --install

      - name: Run CPU tests (CPP)
        run: ctest --test-dir cpp/build -L cpu --output-on-failure

      - name: Generate SF-1 test data
        run: |
          conda install -y -n base -c conda-forge duckdb-cli
          testdata/generate_testdata.sh

      - name: Run Rust unit tests
        run: cargo test -p peacockdb-core --lib
        env:
          CMAKE_GENERATOR: Ninja

      - name: Run query plan tests
        run: cargo test -p peacockdb-core --test test_queries
        env:
          CMAKE_GENERATOR: Ninja

  gpu-tests:
    name: GPU Tests (shad-gpu)
    needs: cpp-cpu
    runs-on: [self-hosted, linux, gpu]
    env:
      CUDF_ROOT: /home/info/miniforge3/envs/rapids-cuda-12.2
      LD_LIBRARY_PATH: /usr/local/cuda-12.5/compat:/home/info/glibc-2.35/lib:/home/info/miniforge3/envs/rapids-cuda-12.2/lib
      PEACOCK_TESTDATA_DIR: ${{ github.workspace }}/testdata

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (CPP)
        run: ./scripts/build.sh --configure --cudf_ROOT "$CUDF_ROOT"

      - name: Build (CPP)
        run: ./scripts/build.sh --build

      - name: Install (CPP)
        run: ./scripts/build.sh --install

      - name: Run GPU tests (CPP)
        run: ctest --test-dir cpp/build -L gpu --output-on-failure
