name: CI Pipeline

on:
  push:
    branches: [master]
  pull_request:

jobs:
  cpp-cpu:
    strategy:
      fail-fast: false
      matrix:
        include:
          - cudf: "26.02"
            image: rapidsai/base:25.10a-cuda12-py3.12
          - cudf: "25.02"
            image: rapidsai/base:25.02-cuda12.0-py3.12
    name: CI Pipeline (cudf ${{ matrix.cudf }})
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}

    steps:
      - name: Install git
        if: matrix.cudf == '25.02'
        run: conda install -y -n base -c conda-forge git curl

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/cpp-build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run CPU tests (CPP)
        run: ctest --test-dir cpp/build -L cpu --output-on-failure

      - name: Generate SF-1 test data
        run: |
          # Pinned: the TPC-DS dsdgen extension's column types drift across
          # DuckDB releases (e.g. INT32 vs INT64 surrogate keys), which would
          # shift row_width and target_batch_size across every plan golden.
          # generate_testdata.sh asserts $(duckdb --version) matches this.
          conda install -y -n base -c conda-forge 'duckdb-cli=1.2.2'
          testdata/generate_testdata.sh
          testdata/generate_testdata.sh --bench tpcds

      - name: Run Rust tests
        run: |
          cargo test -p peacockdb-core --test test_plan_serialiser
          cargo test -p peacockdb-core --test test_query_plan
          cargo test -p peacockdb-core --test test_query_plan_tpcds
          cargo test -p peacockdb-core --test test_cpu_executor
          cargo test -p peacockdb-ffi --test test_ffi
        env:
          CMAKE_GENERATOR: Ninja
          LD_LIBRARY_PATH: /opt/conda/lib
          CUDF_ROOT: /opt/conda
          # Strip debug info from all Rust artifacts. The test binaries link the
          # full DataFusion/Arrow stack plus libpeacock_gpu; with debuginfo the
          # largest one (test_query_plan_tpcds) overflows the container's tmpfs
          # while lld writes its mmap'd output, crashing with SIGBUS. Debug info
          # is dead weight for pass/fail CI anyway.
          RUSTFLAGS: "-C debuginfo=0"

  # Standalone build job for the shad-gpu artifact — runs in parallel with cpp-cpu
  # so gpu-tests can start as soon as the build is done, without waiting for the
  # CPU tests + Rust tests to finish.
  cpp-build-2502:
    name: CI Pipeline (build 25.02 for GPU)
    runs-on: ubuntu-latest
    container:
      image: rapidsai/base:25.02-cuda12.0-py3.12

    steps:
      - name: Install git
        run: conda install -y -n base -c conda-forge git curl

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/cpp-build

      - name: Bundle Arrow/Parquet runtime libraries
        run: |
          mkdir -p cpp/install/lib
          cp -P /opt/conda/lib/libarrow.so* cpp/install/lib/
          cp -P /opt/conda/lib/libparquet.so* cpp/install/lib/
          cp -P /opt/conda/lib/libarrow_acero.so* cpp/install/lib/ 2>/dev/null || true
          cp -P /opt/conda/lib/libarrow_dataset.so* cpp/install/lib/ 2>/dev/null || true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build and stage rust GPU test binaries
        run: |
          mkdir -p cpp/install/rust-tests
          for t in test_gpu_executor test_gpu_executor_tpcds; do
            exec_path=$(cargo test --no-run -p peacockdb-core --test "$t" \
                --message-format=json \
              | python3 -c '
          import json, sys
          name = sys.argv[1]
          for line in sys.stdin:
              try: m = json.loads(line)
              except ValueError: continue
              if m.get("executable") and (m.get("target") or {}).get("name") == name:
                  print(m["executable"]); break
          ' "$t")
            if [ -z "$exec_path" ] || [ ! -f "$exec_path" ]; then
              echo "ERROR: failed to locate built binary for $t"; exit 1
            fi
            cp -f "$exec_path" "cpp/install/rust-tests/$t"
            echo "--- Staged: $(ls -lh cpp/install/rust-tests/$t)"
          done
        env:
          CMAKE_GENERATOR: Ninja
          LD_LIBRARY_PATH: /opt/conda/lib
          CUDF_ROOT: /opt/conda

      - name: Upload GPU test binaries
        uses: actions/upload-artifact@v4
        with:
          name: cpp-install-25.02
          path: cpp/install/
          retention-days: 1

  gpu-tests:
    name: GPU Tests (remote)
    needs: cpp-build-2502
    runs-on: ubuntu-latest
    # Secrets aren't passed to fork PRs, so this job just fails-fast there.
    env:
      GPU_HOST: info@llm-gpu0h200.velkerr.ru
      REMOTE_DIR: /home/info/peacockdb-ci/run-${{ github.run_id }}-${{ github.run_attempt }}
      REMOTE_LD_LIBRARY_PATH: /usr/local/cuda-12.5/compat:/home/info/glibc-2.35/lib:/home/info/miniforge3/envs/rapids-cuda-12.2/lib

    steps:
      - uses: actions/checkout@v4

      - name: Download GPU test binaries
        uses: actions/download-artifact@v4
        with:
          name: cpp-install-25.02
          path: cpp/install/

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.SHAD_GPU_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Trust-on-first-use: acceptable for CI since runners are ephemeral.
          cat > ~/.ssh/config <<EOF
          Host gpu
              HostName llm-gpu0h200.velkerr.ru
              User info
              IdentityFile ~/.ssh/id_ed25519
              StrictHostKeyChecking accept-new
              UserKnownHostsFile ~/.ssh/known_hosts_ci
          EOF

      - name: Rsync artifacts and testdata to remote
        run: |
          ssh gpu "mkdir -p $REMOTE_DIR/cpp/install $REMOTE_DIR/testdata $REMOTE_DIR/scripts"
          # Fresh binaries — --delete keeps cpp/install/ clean across runs.
          rsync -a --delete cpp/install/ gpu:$REMOTE_DIR/cpp/install/
          # Query SQL + minimal dataset + testdata generator.
          rsync -a testdata/tpch-queries testdata/tpcds-queries testdata/tpch.minimal \
            testdata/generate_testdata.sh \
            gpu:$REMOTE_DIR/testdata/
          # Ship the updated setup-glibc.sh so its patch_rust_dir step is
          # present on the host (not just the older /home/info/ copy).
          rsync -a scripts/setup-glibc.sh gpu:$REMOTE_DIR/scripts/
          chmod +x cpp/install/bin/* cpp/install/rust-tests/* 2>/dev/null || true
          ssh gpu "chmod +x \
            $REMOTE_DIR/cpp/install/bin/* \
            $REMOTE_DIR/cpp/install/rust-tests/* \
            $REMOTE_DIR/testdata/generate_testdata.sh \
            $REMOTE_DIR/scripts/setup-glibc.sh 2>/dev/null || true"

      - name: Patch binaries for glibc 2.35
        run: ssh gpu "$REMOTE_DIR/scripts/setup-glibc.sh --repo-dir $REMOTE_DIR --patch"

      - name: Generate SF-1 testdata (skips if present)
        run: |
          ssh gpu "cd $REMOTE_DIR && DUCKDB=/home/info/.local/bin/duckdb testdata/generate_testdata.sh"
          ssh gpu "cd $REMOTE_DIR && DUCKDB=/home/info/.local/bin/duckdb testdata/generate_testdata.sh --bench tpcds"

      - name: Run GPU tests
        run: |
          ssh gpu bash <<EOF
            # Deliberately no 'set -e': run every test binary even when an
            # earlier one fails (e.g. TPC-H failing must not skip TPC-DS), then
            # fail the step at the end if anything failed. Each binary's pass/fail
            # is OR'd into rc.
            export PEACOCK_TESTDATA_DIR=$REMOTE_DIR/testdata
            export LD_LIBRARY_PATH=$REMOTE_DIR/cpp/install/lib:$REMOTE_LD_LIBRARY_PATH

            rc=0

            echo "==> peacock_plan_tests (C++)"
            $REMOTE_DIR/cpp/install/bin/peacock_plan_tests || rc=1

            echo "==> rust GPU integration tests"
            for t in $REMOTE_DIR/cpp/install/rust-tests/*; do
              [ -x "\$t" ] || continue
              echo "--- \$(basename \$t)"
              # --test-threads=1: cuDF/RMM share one process-wide pool; running
              # several GPU tests concurrently OOMs the device and poisons the
              # CUDA context, cascading into bad_alloc/cudaErrorIllegalAddress
              # for every later test. Sequential is mandatory.
              "\$t" --nocapture --test-threads=1 || rc=1
            done

            exit \$rc
          EOF

      - name: Cleanup remote run directory
        if: always()
        run: ssh -o ConnectTimeout=10 gpu "rm -rf $REMOTE_DIR" || true
